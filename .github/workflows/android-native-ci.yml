name: android-native-ci

on:
  push:
    branches: [main]
    paths:
      - 'android-native/**'
      - '.github/workflows/android-native-ci.yml'
  pull_request:
    paths:
      - 'android-native/**'
      - '.github/workflows/android-native-ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-native

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android-native/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('android-native/**/*.gradle*', 'android-native/**/gradle-wrapper.properties', 'android-native/gradle/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Write env.local.properties (placeholders only)
        run: |
          cat > ../env.local.properties <<'EOF'
          SUPABASE_URL=https://api.tryeatpal.com
          SUPABASE_ANON_KEY=REPLACE_WITH_YOUR_ANON_KEY
          SENTRY_DSN=
          GOOGLE_WEB_CLIENT_ID=
          EOF

      - name: Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Lint (debug)
        run: ./gradlew :app:lintDebug --stacktrace

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android-native/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: android-native/app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
          retention-days: 14
