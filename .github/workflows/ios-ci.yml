name: iOS CI

on:
  pull_request:
    paths:
      - 'ios/**'
      - '.github/workflows/ios-ci.yml'
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-ci.yml'

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  XCODE_VERSION: '26.2'
  SCHEME: 'EatPal'
  PROJECT_DIR: 'ios/EatPal'

jobs:
  build:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: |
          XCODE_APP="/Applications/Xcode_${{ env.XCODE_VERSION }}.app"
          if [ ! -d "$XCODE_APP" ]; then
            echo "::warning::Xcode ${{ env.XCODE_VERSION }} not found at $XCODE_APP. Falling back to latest installed Xcode."
            XCODE_APP=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
            if [ -z "$XCODE_APP" ]; then
              echo "::error::No Xcode installation found on runner."
              exit 1
            fi
            echo "Using $XCODE_APP"
          fi
          sudo xcode-select -s "$XCODE_APP"

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen xcbeautify

      - name: Generate Xcode project
        working-directory: ${{ env.PROJECT_DIR }}
        run: xcodegen generate

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/spm-cache
          key: spm-${{ runner.os }}-${{ hashFiles('ios/EatPal/project.yml') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Resolve SPM dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          xcodebuild -resolvePackageDependencies \
            -project EatPal.xcodeproj \
            -scheme "$SCHEME" \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/spm-cache"

      - name: Build for simulator
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          set -o pipefail
          xcodebuild build \
            -project EatPal.xcodeproj \
            -scheme "$SCHEME" \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            -configuration Debug \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/spm-cache" \
            SUPABASE_URL="https://placeholder.supabase.co" \
            SUPABASE_ANON_KEY="placeholder-key-for-ci-build" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify

      - name: Run tests
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          set -o pipefail
          xcodebuild test \
            -project EatPal.xcodeproj \
            -scheme "$SCHEME" \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            -configuration Debug \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/spm-cache" \
            -resultBundlePath "$RUNNER_TEMP/TestResults.xcresult" \
            SUPABASE_URL="https://placeholder.supabase.co" \
            SUPABASE_ANON_KEY="placeholder-key-for-ci-build" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ${{ runner.temp }}/TestResults.xcresult
          retention-days: 7
          if-no-files-found: ignore

  swiftlint:
    name: SwiftLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run SwiftLint
        uses: norio-nomura/action-swiftlint@3.2.1
        with:
          args: --strict
        env:
          WORKING_DIRECTORY: ios/EatPal/EatPal
        continue-on-error: true
