name: iOS CI

on:
  pull_request:
    paths:
      - 'ios/**'
      - '.github/workflows/ios-ci.yml'
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-ci.yml'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or commit to build (defaults to current)'
        required: false
        default: ''
  # Callable by the prd-verify workflow so PRD story verification reuses this
  # real build+test gate instead of duplicating the macOS pipeline.
  workflow_call:

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  XCODE_VERSION: '26.2'
  SCHEME: 'EatPal'
  PROJECT_DIR: 'ios/EatPal'

jobs:
  build:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: |
          XCODE_APP="/Applications/Xcode_${{ env.XCODE_VERSION }}.app"
          if [ ! -d "$XCODE_APP" ]; then
            echo "::warning::Xcode ${{ env.XCODE_VERSION }} not found at $XCODE_APP. Falling back to latest installed Xcode."
            XCODE_APP=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
            if [ -z "$XCODE_APP" ]; then
              echo "::error::No Xcode installation found on runner."
              exit 1
            fi
            echo "Using $XCODE_APP"
          fi
          sudo xcode-select -s "$XCODE_APP"

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen xcbeautify

      - name: Generate Xcode project
        working-directory: ${{ env.PROJECT_DIR }}
        run: xcodegen generate

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/spm-cache
          key: spm-${{ runner.os }}-${{ hashFiles('ios/EatPal/project.yml') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Resolve SPM dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          xcodebuild -resolvePackageDependencies \
            -project EatPal.xcodeproj \
            -scheme "$SCHEME" \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/spm-cache"

      - name: Build for simulator
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          set -o pipefail
          xcodebuild build \
            -project EatPal.xcodeproj \
            -scheme "$SCHEME" \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            -configuration Debug \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/spm-cache" \
            SUPABASE_URL="https://placeholder.supabase.co" \
            SUPABASE_ANON_KEY="placeholder-key-for-ci-build" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify

      - name: Run tests
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          set -o pipefail
          # `xcodebuild test` needs a concrete booted simulator — a hardcoded
          # name like "iPhone 16" breaks whenever the runner image's simulator
          # set changes. Resolve the first available iPhone simulator instead
          # (same approach as ios-app-store-deploy.yml).
          SIM_DEVICE=$(xcrun simctl list devices available -j \
            | python3 -c "import sys,json; devs=json.load(sys.stdin)['devices']; print(next(d['udid'] for r in devs for d in devs[r] if 'iPhone' in d['name'] and d['isAvailable']),end='')" 2>/dev/null || true)
          if [ -z "$SIM_DEVICE" ]; then
            echo "::error::No available iPhone simulator found on the runner."
            exit 1
          fi
          echo "Using simulator: $SIM_DEVICE"
          xcodebuild test \
            -project EatPal.xcodeproj \
            -scheme "$SCHEME" \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,id=$SIM_DEVICE" \
            -configuration Debug \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/spm-cache" \
            -resultBundlePath "$RUNNER_TEMP/TestResults.xcresult" \
            SUPABASE_URL="https://placeholder.supabase.co" \
            SUPABASE_ANON_KEY="placeholder-key-for-ci-build" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify

      - name: Enforce coverage floor
        working-directory: ${{ env.PROJECT_DIR }}
        env:
          # Conservative starting floor — set low on purpose so this gate can't
          # break CI before you know the real number. The step prints the actual
          # coverage on every run; after the first green run, raise this to a
          # couple of points below that figure, then ratchet it up as the
          # Services/DeepLink/Analytics suites grow. It only moves one way.
          MIN_COVERAGE: '0.05'
        run: |
          set -o pipefail
          COV=$(xcrun xccov view --report --json "$RUNNER_TEMP/TestResults.xcresult" | jq -r '.lineCoverage')
          PCT=$(awk -v c="$COV" 'BEGIN { printf "%.2f", c * 100 }')
          FLOOR_PCT=$(awk -v f="$MIN_COVERAGE" 'BEGIN { printf "%.0f", f * 100 }')
          echo "Line coverage: ${PCT}% (floor ${FLOOR_PCT}%)"
          if awk -v c="$COV" -v f="$MIN_COVERAGE" 'BEGIN { exit !(c + 0 < f + 0) }'; then
            echo "::error::Line coverage ${PCT}% is below the floor of ${FLOOR_PCT}%"
            exit 1
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ${{ runner.temp }}/TestResults.xcresult
          retention-days: 7
          if-no-files-found: ignore

  swiftlint:
    name: SwiftLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Blocking gate. Runs from ios/EatPal so it picks up .swiftlint.yml and
      # its `included:` paths (EatPal, EatPalWidget).
      #
      # NOTE: this fails the job on SwiftLint *errors* only (e.g. line_length
      # > 200, snake_case identifiers configured as error). Warnings still pass
      # so flipping the switch can't break CI on day one. Once the warning
      # backlog is clean, add `args: --strict` below to make warnings blocking
      # too — that's the final ratchet.
      - name: Run SwiftLint
        uses: norio-nomura/action-swiftlint@3.2.1
        env:
          WORKING_DIRECTORY: ios/EatPal
