name: Web CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      run_edge_tests:
        description: 'Run the critical edge-function suite (needs a local Supabase; informational)'
        type: boolean
        default: true

env:
  NODE_VERSION: '20'

jobs:
  quality:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      # ESLint. The repo carries a large PRE-EXISTING lint backlog (mostly
      # @typescript-eslint/no-explicit-any and unused caught-errors — see
      # US-342). The no-console rule (US-343) is fully satisfied. Until the
      # backlog is burned down this step is NON-BLOCKING (same treatment as the
      # typecheck below): it surfaces the count as a warning annotation but does
      # not fail the pipeline, so merges stay unblocked. Flip continue-on-error
      # to false once the count hits zero.
      - name: Lint (non-blocking until backlog cleared)
        continue-on-error: true
        run: |
          set +e
          npm run lint 2>&1 | tee /tmp/lint.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            count=$(grep -cE '  error  ' /tmp/lint.log || true)
            echo "::warning title=Lint backlog::eslint reported ${count} error(s). Non-blocking for now; burn the backlog down (US-342), then make this a hard gate."
          fi
          exit 0

      # Real type-check (the old `tsc --noEmit` checked zero files — root
      # tsconfig has files:[]). `npm run typecheck` runs `tsc -b` over the
      # referenced projects. There is a large PRE-EXISTING backlog of type
      # errors (mostly from a stale generated src/integrations/supabase/types.ts
      # — regenerated in the `types-and-functions` job). Until that backlog is
      # burned down this step is NON-BLOCKING: it surfaces errors as a warning
      # annotation but does not fail the pipeline, so merges stay unblocked.
      # Flip `continue-on-error` to false (hard gate) once the count hits zero.
      - name: Typecheck (non-blocking until backlog cleared)
        continue-on-error: true
        run: |
          set +e
          npm run typecheck 2>&1 | tee /tmp/typecheck.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            count=$(grep -cE 'error TS' /tmp/typecheck.log || true)
            echo "::warning title=Typecheck backlog::tsc reported ${count} type error(s). Non-blocking for now; burn the backlog down, then make this a hard gate."
          fi
          exit 0

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Run tests
        run: npx vitest run

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [quality, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Build
        run: npx vite build
        env:
          # Vite INLINES these into the bundle at build time, and the same
          # dist/ artifact is what deploy-production/-staging ship. So the
          # build must use the REAL anon key — otherwise production serves a
          # client whose apikey is a placeholder and every request (including
          # sign-in) fails with 401 "Invalid API key". The anon key is public
          # by design. PR/fork builds (no secret access) fall back to the
          # placeholder; they never deploy.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://api.tryeatpal.com' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder-for-ci-build' }}
          VITE_FUNCTIONS_URL: ${{ secrets.VITE_FUNCTIONS_URL }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  migration-test:
    name: Migration Test
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start --exclude gotrue,storage-api,imgproxy,inbucket,postgrest,realtime,edge-runtime,logflare,vector,supavisor

      - name: Apply migrations
        run: supabase db push --local

      - name: Stop local Supabase
        if: always()
        run: supabase stop

  types-and-functions:
    name: Types Drift & Edge Functions
    runs-on: ubuntu-latest
    # Intentionally independent of `quality`: this job only gathers
    # schema/type/edge-function signal and uploads artifacts (it gates
    # nothing), so the repo's pre-existing lint debt must not skip it.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      # Fast, hermetic unit tests for the shared edge-function security helpers
      # (auth/household/admin/rate-limit/validation/price-allowlist). No DB needed.
      - name: Deno helper unit tests
        run: deno test functions/_shared/helpers_test.ts

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # Full stack (db + auth + edge-runtime) so the edge-function suite
      # has live endpoints to hit. Heavier than migration-test on purpose.
      - name: Start local Supabase
        run: supabase start --exclude imgproxy,logflare,vector,supavisor

      - name: Apply migrations
        run: supabase db push --local

      # Regenerate types from the actual migrated schema. We do NOT fail
      # the pipeline on drift (the pinned-vs-latest CLI can reformat
      # cosmetically); instead we surface a clear annotation + upload the
      # freshly generated file so it can be diffed / committed verbatim.
      - name: Regenerate Supabase types
        run: |
          mkdir -p artifacts
          supabase gen types typescript --local > artifacts/types.generated.ts
          echo "Generated $(wc -l < artifacts/types.generated.ts) lines."

      - name: Report type drift (informational)
        continue-on-error: true
        run: |
          if diff -q src/integrations/supabase/types.ts artifacts/types.generated.ts >/dev/null 2>&1; then
            echo "types.ts is in sync with migrations."
          else
            echo "::warning::src/integrations/supabase/types.ts differs from the migrated schema. Download the 'supabase-types' artifact and commit it (or run: supabase gen types typescript --local > src/integrations/supabase/types.ts)."
            echo "----- tables present in regenerated types -----"
            grep -oE '^      [a-z_]+: \{' artifacts/types.generated.ts | sed -E 's/[ :{]//g' | sort | sed 's/^/  /'
            echo "----- unified diff (truncated to 400 lines) -----"
            diff -u src/integrations/supabase/types.ts artifacts/types.generated.ts | head -400 || true
          fi

      - name: Upload regenerated types
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: supabase-types
          path: artifacts/types.generated.ts
          retention-days: 14

      # Edge-function suite is environment-sensitive (some functions need
      # provider secrets that don't exist in CI), so it is informational:
      # it never blocks the pipeline, but the JSON/HTML report is uploaded
      # so per-function pass/fail can drive the next iteration.
      - name: Run critical edge-function tests
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_edge_tests }}
        continue-on-error: true
        env:
          CI: 'true'
          VITE_SUPABASE_URL: http://localhost:54321
          VITE_FUNCTIONS_URL: http://localhost:54321
        run: |
          # Map the local keys printed by `supabase status` into the names
          # the function test harness expects.
          eval "$(supabase status -o env | sed 's/^/export SB_/')"
          export VITE_SUPABASE_ANON_KEY="${SB_ANON_KEY:-$VITE_SUPABASE_ANON_KEY}"
          export SUPABASE_SERVICE_ROLE_KEY="${SB_SERVICE_ROLE_KEY:-}"
          npm run test:functions:critical

      - name: Upload edge-function results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: edge-function-results
          path: tests/functions/results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Stop local Supabase
        if: always()
        run: supabase stop

  security-sast:
    name: Security SAST Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Run CodeQL Analysis
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript-typescript'

  dependency-audit:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=critical
        continue-on-error: false

      - name: Audit all dependencies (warnings only)
        run: npm audit --audit-level=high || true

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://tryeatpal.com
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=eatpal

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: staging
      url: https://staging.tryeatpal.com
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to Cloudflare Pages (Staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=eatpal-staging
