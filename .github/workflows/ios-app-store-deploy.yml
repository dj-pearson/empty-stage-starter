name: iOS App Store Deploy

# Manual trigger with version input
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'App version (e.g., 1.2.0)'
        required: true
        type: string
      build_number:
        description: 'Build number (auto-increments if empty)'
        required: false
        type: string
        default: ''
      release_notes:
        description: 'What changed in this release'
        required: false
        type: string
        default: 'Bug fixes and performance improvements.'
      submit_for_review:
        description: 'Submit to App Store Review after upload'
        required: false
        type: boolean
        default: false
      skip_tests:
        description: 'Skip unit tests in preflight (NOT recommended)'
        required: false
        type: boolean
        default: false

# Prevent concurrent deployments
concurrency:
  group: ios-deploy
  cancel-in-progress: false

env:
  XCODE_VERSION: '26.2'
  SCHEME: 'EatPal'
  PROJECT_DIR: 'ios/EatPal'
  BUNDLE_ID: 'com.eatpal.app'
  WIDGET_BUNDLE_ID: 'com.eatpal.app.widget'

jobs:
  # -------------------------------------------------------------------
  # Job 1: Validate inputs, build number, AND every required secret.
  # Fails fast (in seconds) if anything is missing — no point spending
  # 10 minutes of macOS runner time only to discover a missing secret.
  # -------------------------------------------------------------------
  validate:
    name: Validate inputs & secrets
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ steps.version.outputs.build_number }}
    steps:
      - name: Validate version format
        id: version
        run: |
          VERSION="${{ inputs.version }}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version must be in semver format (e.g., 1.2.0). Got: $VERSION"
            exit 1
          fi

          BUILD="${{ inputs.build_number }}"
          if [ -z "$BUILD" ]; then
            BUILD="$(date -u +%Y%m%d).${{ github.run_number }}"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD" >> "$GITHUB_OUTPUT"
          {
            echo "## Build Info"
            echo "- **Version**: $VERSION"
            echo "- **Build**: $BUILD"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check required secrets are present
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_P12_CERTIFICATE_BASE64: ${{ secrets.IOS_P12_CERTIFICATE_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_WIDGET_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_WIDGET_PROVISIONING_PROFILE_BASE64 }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          MISSING=()
          REQUIRED_SECRETS=(
            APPLE_TEAM_ID
            IOS_P12_CERTIFICATE_BASE64
            IOS_P12_PASSWORD
            IOS_KEYCHAIN_PASSWORD
            IOS_PROVISIONING_PROFILE_BASE64
            IOS_WIDGET_PROVISIONING_PROFILE_BASE64
            APP_STORE_CONNECT_API_KEY_ID
            APP_STORE_CONNECT_ISSUER_ID
            APP_STORE_CONNECT_API_KEY_BASE64
            SUPABASE_URL
            SUPABASE_ANON_KEY
          )
          for var in "${REQUIRED_SECRETS[@]}"; do
            if [ -z "${!var}" ]; then
              MISSING+=("$var")
            fi
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing required secrets:"
            for s in "${MISSING[@]}"; do
              echo "::error::  - $s"
            done
            exit 1
          fi
          echo "All required secrets present."

  # -------------------------------------------------------------------
  # Job 2: Preflight — lint, compile-check on simulator (no signing),
  # run unit tests, and run static analysis. This catches every kind of
  # source-level error WITHOUT the noise of signing / provisioning.
  # If this fails, build-and-deploy never starts.
  # -------------------------------------------------------------------
  preflight:
    name: Preflight (lint + simulator build + tests)
    needs: validate
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: |
          XCODE_APP="/Applications/Xcode_${{ env.XCODE_VERSION }}.app"
          if [ ! -d "$XCODE_APP" ]; then
            echo "::warning::Xcode ${{ env.XCODE_VERSION }} not found at $XCODE_APP. Falling back to latest installed Xcode."
            XCODE_APP=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
            if [ -z "$XCODE_APP" ]; then
              echo "::error::No Xcode installation found on runner."
              exit 1
            fi
            echo "Using $XCODE_APP"
          fi
          sudo xcode-select -s "$XCODE_APP"

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install build tools
        run: brew install xcodegen xcbeautify swiftlint

      # ---- Static, non-build sanity checks ------------------------------
      - name: Validate plist files
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          set -e
          # Note: EatPalWidget/Info.plist is generated by xcodegen (see project.yml
          # EatPalWidgetExtension.info.path) and is validated after the "Generate
          # Xcode project" step below.
          for plist in \
            "EatPal/Resources/Info.plist" \
            "EatPal/Resources/PrivacyInfo.xcprivacy" \
            "EatPal/EatPal.entitlements" \
            "EatPalWidget/EatPalWidgetExtension.entitlements" \
            "ExportOptions.plist"; do
            if [ ! -f "$plist" ]; then
              echo "::error::Missing required plist/entitlement file: $plist"
              exit 1
            fi
            if ! plutil -lint "$plist" >/dev/null; then
              echo "::error::Invalid plist syntax: $plist"
              plutil -lint "$plist"
              exit 1
            fi
            echo "OK: $plist"
          done

      - name: Verify ExportOptions.plist bundle IDs
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          APP_PROFILE=$(/usr/libexec/PlistBuddy -c "Print :provisioningProfiles:${{ env.BUNDLE_ID }}" ExportOptions.plist 2>/dev/null || true)
          WIDGET_PROFILE=$(/usr/libexec/PlistBuddy -c "Print :provisioningProfiles:${{ env.WIDGET_BUNDLE_ID }}" ExportOptions.plist 2>/dev/null || true)
          if [ -z "$APP_PROFILE" ]; then
            echo "::error::ExportOptions.plist missing provisioningProfiles entry for ${{ env.BUNDLE_ID }}"
            exit 1
          fi
          if [ -z "$WIDGET_PROFILE" ]; then
            echo "::error::ExportOptions.plist missing provisioningProfiles entry for ${{ env.WIDGET_BUNDLE_ID }}"
            exit 1
          fi
          echo "App profile:    $APP_PROFILE"
          echo "Widget profile: $WIDGET_PROFILE"

      - name: SwiftLint (informational; does not fail build)
        working-directory: ${{ env.PROJECT_DIR }}
        continue-on-error: true
        run: |
          set -o pipefail
          swiftlint lint --reporter github-actions-logging EatPal EatPalWidget

      - name: Generate Xcode project
        working-directory: ${{ env.PROJECT_DIR }}
        run: xcodegen generate

      - name: Validate generated widget Info.plist
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          set -e
          plist="EatPalWidget/Info.plist"
          if [ ! -f "$plist" ]; then
            echo "::error::xcodegen did not produce $plist"
            exit 1
          fi
          if ! plutil -lint "$plist" >/dev/null; then
            echo "::error::Invalid plist syntax in generated $plist"
            plutil -lint "$plist"
            exit 1
          fi
          echo "OK: $plist"

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/spm-cache
          key: spm-${{ runner.os }}-${{ hashFiles('ios/EatPal/project.yml') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Resolve Swift Package Manager dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          xcodebuild -resolvePackageDependencies \
            -project EatPal.xcodeproj \
            -scheme "$SCHEME" \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/spm-cache"

      # ---- Compile + test on simulator (no signing, fast feedback) ------
      - name: Compile-check (simulator, Debug, no signing)
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          set -o pipefail
          xcodebuild build \
            -project EatPal.xcodeproj \
            -scheme "$SCHEME" \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            -configuration Debug \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/spm-cache" \
            -resultBundlePath "$RUNNER_TEMP/Preflight.xcresult" \
            SUPABASE_URL="https://placeholder.supabase.co" \
            SUPABASE_ANON_KEY="placeholder-key-for-ci-build" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions

      - name: Run unit tests
        if: ${{ !inputs.skip_tests }}
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          set -o pipefail
          xcodebuild test \
            -project EatPal.xcodeproj \
            -scheme "$SCHEME" \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            -configuration Debug \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/spm-cache" \
            -resultBundlePath "$RUNNER_TEMP/Tests.xcresult" \
            SUPABASE_URL="https://placeholder.supabase.co" \
            SUPABASE_ANON_KEY="placeholder-key-for-ci-build" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions

      - name: Static analysis (xcodebuild analyze)
        working-directory: ${{ env.PROJECT_DIR }}
        continue-on-error: true
        run: |
          set -o pipefail
          xcodebuild analyze \
            -project EatPal.xcodeproj \
            -scheme "$SCHEME" \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            -configuration Debug \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/spm-cache" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions

      - name: Upload preflight xcresult
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preflight-xcresult
          path: |
            ${{ runner.temp }}/Preflight.xcresult
            ${{ runner.temp }}/Tests.xcresult
          retention-days: 7
          if-no-files-found: ignore

  # -------------------------------------------------------------------
  # Job 3: Build, sign, archive, and upload to App Store Connect.
  # Only runs after preflight is green, so any failure here is
  # signing- or distribution-related — not source code.
  # -------------------------------------------------------------------
  build-and-deploy:
    name: Build & Deploy to App Store
    needs: [validate, preflight]
    runs-on: macos-15
    timeout-minutes: 60
    env:
      APP_VERSION: ${{ needs.validate.outputs.version }}
      BUILD_NUMBER: ${{ needs.validate.outputs.build_number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: |
          XCODE_APP="/Applications/Xcode_${{ env.XCODE_VERSION }}.app"
          if [ ! -d "$XCODE_APP" ]; then
            echo "::warning::Xcode ${{ env.XCODE_VERSION }} not found at $XCODE_APP. Falling back to latest installed Xcode."
            XCODE_APP=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
            if [ -z "$XCODE_APP" ]; then
              echo "::error::No Xcode installation found on runner."
              exit 1
            fi
            echo "Using $XCODE_APP"
          fi
          sudo xcode-select -s "$XCODE_APP"

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install build tools
        run: brew install xcodegen xcbeautify

      - name: Generate Xcode project
        working-directory: ${{ env.PROJECT_DIR }}
        run: xcodegen generate

      - name: Update version and build number
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          PLIST_PATH="EatPal/Resources/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $APP_VERSION" "$PLIST_PATH"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$PLIST_PATH"
          echo "Updated $PLIST_PATH:"
          /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$PLIST_PATH"
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$PLIST_PATH"

      # ---- Signing setup -------------------------------------------------
      - name: Install Apple certificate
        env:
          P12_CERTIFICATE_BASE64: ${{ secrets.IOS_P12_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          echo -n "$P12_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$P12_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain

          # Verify we have a usable distribution identity. Accept either the
          # modern "Apple Distribution" cert or the legacy "iPhone Distribution"
          # cert — both are still valid for App Store submission. Export the
          # matching name for the archive step to consume.
          IDENTITY_LIST=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH")
          echo "$IDENTITY_LIST"
          if echo "$IDENTITY_LIST" | grep -q "Apple Distribution"; then
            DETECTED_IDENTITY="Apple Distribution"
          elif echo "$IDENTITY_LIST" | grep -q "iPhone Distribution"; then
            DETECTED_IDENTITY="iPhone Distribution"
          else
            echo "::error::No 'Apple Distribution' or 'iPhone Distribution' identity found in keychain after import."
            exit 1
          fi
          echo "Using signing identity: $DETECTED_IDENTITY"
          echo "CODE_SIGN_IDENTITY=$DETECTED_IDENTITY" >> "$GITHUB_ENV"

      - name: Install app provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          printf '%s' "$PROVISIONING_PROFILE_BASE64" | tr -d '[:space:]' | base64 --decode -o "$PROFILE_PATH"

          PLIST_PATH="$RUNNER_TEMP/profile.plist"
          security cms -D -i "$PROFILE_PATH" -o "$PLIST_PATH"

          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$PLIST_PATH")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$PLIST_PATH")
          PROFILE_APP_ID=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" "$PLIST_PATH" | sed 's/^[A-Z0-9]*\.//')
          PROFILE_EXPIRY=$(/usr/libexec/PlistBuddy -c "Print :ExpirationDate" "$PLIST_PATH")

          if [ "$PROFILE_APP_ID" != "${{ env.BUNDLE_ID }}" ]; then
            echo "::error::App profile bundle ID mismatch: profile is for '$PROFILE_APP_ID' but app uses '${{ env.BUNDLE_ID }}'"
            exit 1
          fi

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROFILE_PATH" \
            ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID.mobileprovision"

          echo "Installed app profile:"
          echo "  UUID:    $PROFILE_UUID"
          echo "  Name:    $PROFILE_NAME"
          echo "  AppID:   $PROFILE_APP_ID"
          echo "  Expires: $PROFILE_EXPIRY"

      - name: Install widget provisioning profile
        env:
          WIDGET_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_WIDGET_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PROFILE_PATH="$RUNNER_TEMP/widget-profile.mobileprovision"
          printf '%s' "$WIDGET_PROVISIONING_PROFILE_BASE64" | tr -d '[:space:]' | base64 --decode -o "$PROFILE_PATH"

          PLIST_PATH="$RUNNER_TEMP/widget-profile.plist"
          security cms -D -i "$PROFILE_PATH" -o "$PLIST_PATH"

          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$PLIST_PATH")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$PLIST_PATH")
          PROFILE_APP_ID=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" "$PLIST_PATH" | sed 's/^[A-Z0-9]*\.//')
          PROFILE_EXPIRY=$(/usr/libexec/PlistBuddy -c "Print :ExpirationDate" "$PLIST_PATH")

          if [ "$PROFILE_APP_ID" != "${{ env.WIDGET_BUNDLE_ID }}" ]; then
            echo "::error::Widget profile bundle ID mismatch: profile is for '$PROFILE_APP_ID' but widget uses '${{ env.WIDGET_BUNDLE_ID }}'"
            exit 1
          fi

          cp "$PROFILE_PATH" \
            ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID.mobileprovision"

          echo "Installed widget profile:"
          echo "  UUID:    $PROFILE_UUID"
          echo "  Name:    $PROFILE_NAME"
          echo "  AppID:   $PROFILE_APP_ID"
          echo "  Expires: $PROFILE_EXPIRY"

      # ---- Build / archive (uses cached SPM from preflight) -------------
      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/spm-cache
          key: spm-${{ runner.os }}-${{ hashFiles('ios/EatPal/project.yml') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Resolve Swift Package Manager dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          xcodebuild -resolvePackageDependencies \
            -project EatPal.xcodeproj \
            -scheme "$SCHEME" \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/spm-cache"

      - name: Build archive
        working-directory: ${{ env.PROJECT_DIR }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -o pipefail
          ARCHIVE_PATH="$RUNNER_TEMP/EatPal.xcarchive"

          xcodebuild archive \
            -project EatPal.xcodeproj \
            -scheme "$SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/spm-cache" \
            -resultBundlePath "$RUNNER_TEMP/Archive.xcresult" \
            -destination "generic/platform=iOS" \
            MARKETING_VERSION="$APP_VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            SUPABASE_URL="$SUPABASE_URL" \
            SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$CODE_SIGN_IDENTITY" \
            | xcbeautify --renderer github-actions

          echo "Archive created at: $ARCHIVE_PATH"

      - name: Validate archive contents
        run: |
          ARCHIVE_PATH="$RUNNER_TEMP/EatPal.xcarchive"
          APP_PATH="$ARCHIVE_PATH/Products/Applications/EatPal.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::Archive missing EatPal.app at $APP_PATH"
            exit 1
          fi
          WIDGET_PATH="$APP_PATH/PlugIns/EatPalWidgetExtension.appex"
          if [ ! -d "$WIDGET_PATH" ]; then
            echo "::error::Archive missing widget extension at $WIDGET_PATH"
            exit 1
          fi
          echo "Code signature on app:"
          codesign -dv --verbose=2 "$APP_PATH" 2>&1 | head -20
          echo "Code signature on widget:"
          codesign -dv --verbose=2 "$WIDGET_PATH" 2>&1 | head -20

      - name: Export IPA
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          set -o pipefail
          ARCHIVE_PATH="$RUNNER_TEMP/EatPal.xcarchive"
          EXPORT_PATH="$RUNNER_TEMP/export"

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "$EXPORT_PATH" \
            | xcbeautify --renderer github-actions

          IPA=$(find "$EXPORT_PATH" -name "*.ipa" -type f | head -1)
          if [ -z "$IPA" ]; then
            echo "::error::Export step produced no .ipa file"
            ls -la "$EXPORT_PATH" || true
            exit 1
          fi
          echo "Exported IPA: $IPA ($(du -h "$IPA" | cut -f1))"

      - name: Upload to App Store Connect
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          set -o pipefail
          API_KEY_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$API_KEY_DIR"
          API_KEY_PATH="$API_KEY_DIR/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          # Use the same whitespace-tolerant decode as the provisioning-profile
          # steps. `base64` output from macOS wraps at 76 chars, and copy/paste
          # can introduce stray newlines — stripping all whitespace first makes
          # the decode robust against both.
          printf '%s' "$APP_STORE_CONNECT_API_KEY_BASE64" | tr -d '[:space:]' | base64 --decode -o "$API_KEY_PATH"

          # Sanity-check the decoded key. A valid App Store Connect .p8 is a
          # PEM file starting with "-----BEGIN PRIVATE KEY-----". If this check
          # fails, the APP_STORE_CONNECT_API_KEY_BASE64 secret is bad (wrong
          # contents, or was stored un-encoded instead of base64-encoded).
          if ! head -1 "$API_KEY_PATH" | grep -q "BEGIN PRIVATE KEY"; then
            echo "::error::Decoded API key does not look like a PEM .p8 file."
            echo "First bytes of decoded output:"
            head -c 100 "$API_KEY_PATH" | od -c | head -5
            echo "Check the APP_STORE_CONNECT_API_KEY_BASE64 secret — it must be"
            echo "the result of: base64 -i AuthKey_XXXXXXXXXX.p8 | pbcopy"
            exit 1
          fi
          # Validate the other two secrets look sane (not swapped). Issuer ID
          # is a UUID; Key ID is a 10-char alphanumeric string.
          if ! echo "$APP_STORE_CONNECT_ISSUER_ID" | grep -Eq '^[0-9a-f-]{36}$'; then
            echo "::error::APP_STORE_CONNECT_ISSUER_ID is not a UUID. Check that"
            echo "APP_STORE_CONNECT_API_KEY_ID and APP_STORE_CONNECT_ISSUER_ID"
            echo "aren't swapped — issuer is a UUID, key id is 10 alphanumeric chars."
            exit 1
          fi

          IPA_PATH=$(find "$RUNNER_TEMP/export" -name "*.ipa" -type f | head -1)
          echo "Uploading $IPA_PATH to App Store Connect..."

          # altool has a quirk: it prints "UPLOAD FAILED" / "VERIFY FAILED"
          # blocks to stdout but still exits 0 on some validation errors,
          # which makes the job look green while nothing actually reached
          # App Store Connect. Capture stdout+stderr and grep for failure
          # markers so the step actually fails.

          # Validate first — surfaces App Store rejection issues without
          # actually uploading. Cheap insurance against bad submissions.
          VALIDATE_LOG="$RUNNER_TEMP/altool-validate.log"
          xcrun altool --validate-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            2>&1 | tee "$VALIDATE_LOG"
          if grep -qE "VERIFY FAILED|Failed to validate package|Validation failed" "$VALIDATE_LOG"; then
            echo "::error::altool validation failed — see the log above for details."
            exit 1
          fi

          UPLOAD_LOG="$RUNNER_TEMP/altool-upload.log"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            2>&1 | tee "$UPLOAD_LOG"
          if grep -qE "UPLOAD FAILED|Failed to upload package|Validation failed" "$UPLOAD_LOG"; then
            echo "::error::altool upload failed — see the log above for details."
            exit 1
          fi

          echo "Upload complete — build will appear in TestFlight after ~15-30 min of processing."

      - name: Submit for App Store Review (notice)
        if: ${{ inputs.submit_for_review }}
        run: |
          echo "::notice::Auto-submission for review is not wired up yet."
          echo "Visit App Store Connect > EatPal > TestFlight to submit once processing finishes."

      # ---- Always-run cleanup + diagnostics -----------------------------
      - name: Upload archive xcresult on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: archive-xcresult
          path: ${{ runner.temp }}/Archive.xcresult
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload xcarchive on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-xcarchive
          path: ${{ runner.temp }}/EatPal.xcarchive
          retention-days: 7
          if-no-files-found: ignore

      - name: Cleanup keychain and secrets
        if: always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
          rm -f "$RUNNER_TEMP/certificate.p12"
          rm -f "$RUNNER_TEMP/profile.mobileprovision"
          rm -f "$RUNNER_TEMP/widget-profile.mobileprovision"
          rm -f "$RUNNER_TEMP/profile.plist"
          rm -f "$RUNNER_TEMP/widget-profile.plist"
          rm -rf "$HOME/.appstoreconnect/private_keys"

      - name: Build summary
        if: success()
        run: |
          {
            echo "## iOS App Store Deploy — Success"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| **Version** | $APP_VERSION |"
            echo "| **Build** | $BUILD_NUMBER |"
            echo "| **Bundle ID** | ${{ env.BUNDLE_ID }} |"
            echo "| **Release Notes** | ${{ inputs.release_notes }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  # -------------------------------------------------------------------
  # Job 4: Tag the release in git
  # -------------------------------------------------------------------
  tag-release:
    name: Tag Release
    needs: [validate, build-and-deploy]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      APP_VERSION: ${{ needs.validate.outputs.version }}
      BUILD_NUMBER: ${{ needs.validate.outputs.build_number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          TAG="ios/v${APP_VERSION}+${BUILD_NUMBER}"
          git tag -a "$TAG" -m "iOS v${APP_VERSION} (build ${BUILD_NUMBER})"
          git push origin "$TAG"
          echo "Tagged release: $TAG" >> "$GITHUB_STEP_SUMMARY"
