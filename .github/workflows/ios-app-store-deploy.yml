name: iOS App Store Deploy

# Manual trigger with version input
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'App version (e.g., 1.2.0)'
        required: true
        type: string
      build_number:
        description: 'Build number (auto-increments if empty)'
        required: false
        type: string
        default: ''
      release_notes:
        description: 'What changed in this release'
        required: false
        type: string
        default: 'Bug fixes and performance improvements.'
      submit_for_review:
        description: 'Submit to App Store Review after upload'
        required: false
        type: boolean
        default: false

# Prevent concurrent deployments
concurrency:
  group: ios-deploy
  cancel-in-progress: false

env:
  XCODE_VERSION: '15.4'
  SCHEME: 'EatPal'
  PROJECT_DIR: 'ios/EatPal'
  BUNDLE_ID: 'com.eatpal.app'

jobs:
  # -------------------------------------------------------------------
  # Job 1: Validate inputs and compute build number
  # -------------------------------------------------------------------
  validate:
    name: Validate & Prepare
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ steps.version.outputs.build_number }}
    steps:
      - name: Validate version format
        id: version
        run: |
          VERSION="${{ inputs.version }}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version must be in semver format (e.g., 1.2.0). Got: $VERSION"
            exit 1
          fi

          BUILD="${{ inputs.build_number }}"
          if [ -z "$BUILD" ]; then
            BUILD="$(date -u +%Y%m%d).${{ github.run_number }}"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD" >> "$GITHUB_OUTPUT"
          echo "## Build Info" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version**: $VERSION" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Build**: $BUILD" >> "$GITHUB_STEP_SUMMARY"

  # -------------------------------------------------------------------
  # Job 2: Build, sign, and upload to App Store Connect
  # -------------------------------------------------------------------
  build-and-deploy:
    name: Build & Deploy to App Store
    needs: validate
    runs-on: macos-14
    timeout-minutes: 60
    env:
      APP_VERSION: ${{ needs.validate.outputs.version }}
      BUILD_NUMBER: ${{ needs.validate.outputs.build_number }}
    steps:
      # ---------------------------------------------------------------
      # Checkout & Setup
      # ---------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen xcbeautify

      - name: Generate Xcode project
        working-directory: ${{ env.PROJECT_DIR }}
        run: xcodegen generate

      # ---------------------------------------------------------------
      # Update version in project files
      # ---------------------------------------------------------------
      - name: Update version and build number
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "Setting version to $APP_VERSION (build $BUILD_NUMBER)"
          PLIST_PATH="EatPal/Resources/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $APP_VERSION" "$PLIST_PATH"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$PLIST_PATH"

          echo "Updated Info.plist:"
          /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$PLIST_PATH"
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$PLIST_PATH"

      # ---------------------------------------------------------------
      # Install certificates & provisioning profiles
      # ---------------------------------------------------------------
      - name: Install Apple certificate
        env:
          P12_CERTIFICATE_BASE64: ${{ secrets.IOS_P12_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          echo -n "$P12_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$P12_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain

      - name: Install app provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          if [ -z "$PROVISIONING_PROFILE_BASE64" ]; then
            echo "::error::IOS_PROVISIONING_PROFILE_BASE64 secret is empty or not set"
            exit 1
          fi
          echo "Base64 secret length: ${#PROVISIONING_PROFILE_BASE64}"

          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          printf '%s' "$PROVISIONING_PROFILE_BASE64" | tr -d '[:space:]' | base64 --decode -o "$PROFILE_PATH"

          echo "Decoded profile size:"
          ls -la "$PROFILE_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PROFILE_UUID=$(security cms -D -i "$PROFILE_PATH" | \
            /usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin)
          cp "$PROFILE_PATH" \
            ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID.mobileprovision"
          echo "Installed app profile: $PROFILE_UUID"

      - name: Install widget provisioning profile
        env:
          WIDGET_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_WIDGET_PROVISIONING_PROFILE_BASE64 }}
        run: |
          if [ -z "$WIDGET_PROVISIONING_PROFILE_BASE64" ]; then
            echo "::warning::IOS_WIDGET_PROVISIONING_PROFILE_BASE64 is not set — widget target will fail to sign."
            exit 0
          fi
          echo "Widget base64 secret length: ${#WIDGET_PROVISIONING_PROFILE_BASE64}"
          PROFILE_PATH="$RUNNER_TEMP/widget-profile.mobileprovision"
          printf '%s' "$WIDGET_PROVISIONING_PROFILE_BASE64" | tr -d '[:space:]' | base64 --decode -o "$PROFILE_PATH"
          ls -la "$PROFILE_PATH"

          PROFILE_UUID=$(security cms -D -i "$PROFILE_PATH" | \
            /usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin)
          cp "$PROFILE_PATH" \
            ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID.mobileprovision"
          echo "Installed widget profile: $PROFILE_UUID"

      # ---------------------------------------------------------------
      # Resolve dependencies (with caching)
      # ---------------------------------------------------------------
      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/spm-cache
          key: spm-deploy-${{ runner.os }}-${{ hashFiles('ios/EatPal/project.yml') }}
          restore-keys: |
            spm-deploy-${{ runner.os }}-

      - name: Resolve Swift Package Manager dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          xcodebuild -resolvePackageDependencies \
            -project EatPal.xcodeproj \
            -scheme "$SCHEME" \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/spm-cache"

      # ---------------------------------------------------------------
      # Build archive
      # ---------------------------------------------------------------
      - name: Build archive
        working-directory: ${{ env.PROJECT_DIR }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -o pipefail
          ARCHIVE_PATH="$RUNNER_TEMP/EatPal.xcarchive"

          xcodebuild archive \
            -project EatPal.xcodeproj \
            -scheme "$SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/spm-cache" \
            -destination "generic/platform=iOS" \
            MARKETING_VERSION="$APP_VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            PRODUCT_BUNDLE_IDENTIFIER="${{ env.BUNDLE_ID }}" \
            SUPABASE_URL="$SUPABASE_URL" \
            SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            | xcbeautify

          echo "Archive created at: $ARCHIVE_PATH"

      # ---------------------------------------------------------------
      # Export IPA
      # ---------------------------------------------------------------
      - name: Export IPA
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          set -o pipefail
          ARCHIVE_PATH="$RUNNER_TEMP/EatPal.xcarchive"
          EXPORT_PATH="$RUNNER_TEMP/export"

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "$EXPORT_PATH" \
            | xcbeautify

          echo "Exported IPA:"
          ls -la "$EXPORT_PATH"/*.ipa

      # ---------------------------------------------------------------
      # Upload to App Store Connect via notarytool/altool
      # ---------------------------------------------------------------
      - name: Upload to App Store Connect
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          API_KEY_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$API_KEY_DIR"
          API_KEY_PATH="$API_KEY_DIR/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          echo -n "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode -o "$API_KEY_PATH"

          IPA_PATH=$(find "$RUNNER_TEMP/export" -name "*.ipa" -type f | head -1)
          echo "Uploading $IPA_PATH to App Store Connect..."

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

          echo "Upload complete — build will appear in TestFlight after ~15-30 min of processing."

      # ---------------------------------------------------------------
      # Submit for review (informational — actual submission requires
      # App Store Connect API; kept as a note for now)
      # ---------------------------------------------------------------
      - name: Submit for App Store Review (notice)
        if: ${{ inputs.submit_for_review }}
        run: |
          echo "::notice::Auto-submission for review is not wired up yet."
          echo "Visit App Store Connect > EatPal > TestFlight to submit once processing finishes."

      # ---------------------------------------------------------------
      # Cleanup
      # ---------------------------------------------------------------
      - name: Cleanup keychain and secrets
        if: always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
          rm -f "$RUNNER_TEMP/certificate.p12"
          rm -f "$RUNNER_TEMP/profile.mobileprovision"
          rm -f "$RUNNER_TEMP/widget-profile.mobileprovision"
          rm -rf "$HOME/.appstoreconnect/private_keys"

      # ---------------------------------------------------------------
      # Summary
      # ---------------------------------------------------------------
      - name: Build summary
        if: success()
        run: |
          echo "## iOS App Store Deploy - Success" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Version** | $APP_VERSION |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Build** | $BUILD_NUMBER |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Bundle ID** | ${{ env.BUNDLE_ID }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Release Notes** | ${{ inputs.release_notes }} |" >> "$GITHUB_STEP_SUMMARY"

  # -------------------------------------------------------------------
  # Job 3: Tag the release in git
  # -------------------------------------------------------------------
  tag-release:
    name: Tag Release
    needs: [validate, build-and-deploy]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      APP_VERSION: ${{ needs.validate.outputs.version }}
      BUILD_NUMBER: ${{ needs.validate.outputs.build_number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          TAG="ios/v${APP_VERSION}+${BUILD_NUMBER}"
          git tag -a "$TAG" -m "iOS v${APP_VERSION} (build ${BUILD_NUMBER})"
          git push origin "$TAG"
          echo "Tagged release: $TAG" >> "$GITHUB_STEP_SUMMARY"
