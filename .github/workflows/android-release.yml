name: android-release

# Builds a signed Android App Bundle (AAB) ready for Play Console upload.
#
# Triggered manually (workflow_dispatch) or by tag (android/v*). The
# workflow_dispatch path is used for ad-hoc release candidates; the tag
# path is used for official releases (matches the iOS `ios/v*` convention).
#
# Required GitHub Actions secrets (Settings → Secrets and variables → Actions):
#   ANDROID_KEYSTORE_BASE64    base64 of eatpal-release.jks
#                              (`base64 -i eatpal-release.jks | pbcopy` on macOS,
#                               `[Convert]::ToBase64String([IO.File]::ReadAllBytes(...))` on Windows)
#   ANDROID_KEYSTORE_PASSWORD  the .jks file password
#   ANDROID_KEY_ALIAS          alias of the upload key inside the .jks
#   ANDROID_KEY_PASSWORD       password for that specific key
#   SUPABASE_URL               https://api.tryeatpal.com (or staging URL)
#   SUPABASE_ANON_KEY          anon JWT
#   SENTRY_DSN                 (optional)
#   GOOGLE_WEB_CLIENT_ID       (optional, for Google Sign-In via Supabase)
#
# Optional — only needed if you opt into the Play Console upload job:
#   PLAY_PUBLISHER_SERVICE_ACCOUNT_JSON_BASE64  base64 of the GCP service-account
#                                               JSON with Play Developer API access
#
# See android-native/RELEASE_GUIDE.md for the end-to-end Play Console flow.

on:
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Console track to upload to (skipped if PLAY_PUBLISHER_SERVICE_ACCOUNT_JSON_BASE64 is unset)'
        required: false
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
          - none
  push:
    tags:
      - 'android/v*'

permissions:
  contents: read

jobs:
  build:
    name: Signed AAB
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-native
    outputs:
      version_name: ${{ steps.version.outputs.name }}
      version_code: ${{ steps.version.outputs.code }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android-native/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('android-native/**/*.gradle*', 'android-native/**/gradle-wrapper.properties', 'android-native/gradle/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ──────────────────────────────────────────────────────────────
      # Materialize secrets onto the runner.
      # ──────────────────────────────────────────────────────────────
      - name: Decode upload keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set. See RELEASE_GUIDE.md."
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/signing"
          echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/signing/eatpal-release.jks"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/signing/eatpal-release.jks" >> "$GITHUB_ENV"

      - name: Write env.local.properties for the build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
        run: |
          # Lives at the repo root because build.gradle.kts loads
          # `rootProject.file("../env.local.properties")`.
          cat > ../env.local.properties <<EOF
          SUPABASE_URL=${SUPABASE_URL:-https://api.tryeatpal.com}
          SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-REPLACE_WITH_YOUR_ANON_KEY}
          SENTRY_DSN=${SENTRY_DSN:-}
          GOOGLE_WEB_CLIENT_ID=${GOOGLE_WEB_CLIENT_ID:-}
          EOF

      - name: Gradle wrapper executable
        run: chmod +x ./gradlew

      # ──────────────────────────────────────────────────────────────
      # Sanity gates before signing.
      # ──────────────────────────────────────────────────────────────
      - name: Unit tests
        run: ./gradlew :app:testReleaseUnitTest --stacktrace

      - name: Lint (release)
        run: ./gradlew :app:lintRelease --stacktrace

      # ──────────────────────────────────────────────────────────────
      # Build the signed AAB.
      # ──────────────────────────────────────────────────────────────
      - name: Bundle release (signed)
        env:
          ANDROID_KEYSTORE_PATH: ${{ env.ANDROID_KEYSTORE_PATH }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:bundleRelease --stacktrace

      # ──────────────────────────────────────────────────────────────
      # Surface version metadata so downstream jobs / Play Console
      # release notes know what just got built.
      # ──────────────────────────────────────────────────────────────
      - name: Read versionName / versionCode from AGP output
        id: version
        run: |
          # AGP writes a metadata.json next to the bundle with the resolved values.
          meta="app/build/outputs/bundle/release/output-metadata.json"
          if [ ! -f "$meta" ]; then
            echo "::warning::output-metadata.json not found; defaulting to 0.0.0/0"
            echo "name=0.0.0" >> "$GITHUB_OUTPUT"
            echo "code=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          name=$(jq -r '.elements[0].versionName' "$meta")
          code=$(jq -r '.elements[0].versionCode' "$meta")
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "code=$code" >> "$GITHUB_OUTPUT"
          echo "Built EatPal v$name ($code)"

      - name: Upload signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: eatpal-release-${{ steps.version.outputs.name }}-${{ steps.version.outputs.code }}.aab
          path: android-native/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 90

      - name: Upload mapping.txt (R8 deobfuscation)
        uses: actions/upload-artifact@v4
        with:
          name: mapping-${{ steps.version.outputs.name }}-${{ steps.version.outputs.code }}.txt
          path: android-native/app/build/outputs/mapping/release/mapping.txt
          if-no-files-found: ignore
          retention-days: 365

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report-release
          path: android-native/app/build/reports/lint-results-release.html
          if-no-files-found: ignore
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────
  # Optional: hand the AAB to Play Console via a service account.
  # Skipped silently when PLAY_PUBLISHER_SERVICE_ACCOUNT_JSON_BASE64 is
  # not set — useful for the first few releases when you want to upload
  # by hand and verify the listing before automating.
  # ──────────────────────────────────────────────────────────────────
  publish:
    name: Play Console upload
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.track != 'none' }}
    steps:
      - uses: actions/checkout@v4

      - name: Check Play service-account secret
        id: gate
        env:
          SA_JSON_B64: ${{ secrets.PLAY_PUBLISHER_SERVICE_ACCOUNT_JSON_BASE64 }}
        run: |
          if [ -z "$SA_JSON_B64" ]; then
            echo "::warning::PLAY_PUBLISHER_SERVICE_ACCOUNT_JSON_BASE64 not set — skipping upload."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download signed AAB
        if: steps.gate.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          name: eatpal-release-${{ needs.build.outputs.version_name }}-${{ needs.build.outputs.version_code }}.aab
          path: ./aab

      - name: Decode service-account JSON
        if: steps.gate.outputs.skip != 'true'
        env:
          SA_JSON_B64: ${{ secrets.PLAY_PUBLISHER_SERVICE_ACCOUNT_JSON_BASE64 }}
        run: |
          echo "$SA_JSON_B64" | base64 --decode > "$RUNNER_TEMP/play-sa.json"

      - name: Upload to Play Console (${{ github.event.inputs.track }} track)
        if: steps.gate.outputs.skip != 'true'
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJson: ${{ runner.temp }}/play-sa.json
          packageName: com.eatpal.app
          releaseFiles: ./aab/app-release.aab
          track: ${{ github.event.inputs.track }}
          status: completed
          mappingFile: ''  # mapping is uploaded as a separate artifact above
          # Release notes can be added by populating
          # android-native/app/src/main/play/release-notes/<lang>/<track>.txt
          # See https://github.com/r0adkll/upload-google-play#release-notes
