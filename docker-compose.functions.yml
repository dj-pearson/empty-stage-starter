version: '3.8'

services:
  edge-functions:
    build:
      context: .
      dockerfile: Dockerfile.functions
    container_name: eatpal-edge-functions
    ports:
      - "8000:8000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_DB_HOST=${SUPABASE_DB_HOST}
      - SUPABASE_DB_PORT=${SUPABASE_DB_PORT}
      - SUPABASE_DB_PASSWORD=${SUPABASE_DB_PASSWORD}
      # AIServiceV2 centralized AI configuration (Coolify Team Shared)
      - AI_DEFAULT_PROVIDER=${AI_DEFAULT_PROVIDER:-anthropic}
      - DEFAULT_AI_MODEL=${DEFAULT_AI_MODEL:-claude-sonnet-4-5-20250929}
      - LIGHTWEIGHT_AI_MODEL=${LIGHTWEIGHT_AI_MODEL:-claude-3-5-haiku-20241022}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - OPENAI_GLOBAL_API=${OPENAI_GLOBAL_API}
      - AI_MAX_RETRIES=${AI_MAX_RETRIES:-3}
      - AI_TIMEOUT_MS=${AI_TIMEOUT_MS:-30000}
      - AI_TEMPERATURE=${AI_TEMPERATURE:-0.7}
      - AI_ENABLE_CACHING=${AI_ENABLE_CACHING:-true}
      # Legacy OpenAI key (used by older functions)
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      # Stripe for payment functions
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      # Email provider
      - RESEND_API_KEY=${RESEND_API_KEY}
    volumes:
      - ./supabase/functions:/app/functions:ro
      - deno-cache:/app/.deno_cache
    restart: unless-stopped
    networks:
      - eatpal-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  deno-cache:
    driver: local

networks:
  eatpal-network:
    external: false

